<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f8f8" />
    <title>HEYTEA Codes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="background-glow background-glow-a"></div>
      <div class="background-glow background-glow-b"></div>
      <header class="topbar">
        <img class="brand-logo" src="heytea.svg" alt="HEYTEA" />
      </header>

      <main class="cards" id="cards"></main>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <template id="card-template">
      <article class="code-card">
        <div class="card-chrome"></div>
        <div class="card-code"></div>
        <div class="card-note"></div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
